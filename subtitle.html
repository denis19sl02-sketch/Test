<!-- colors.html -->
<!DOCTYPE html>
<html>
<head>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

.color{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    animation:move 10s infinite alternate;
}

.c1{
    width:300px;
    height:300px;
    background:#00bfff;
    top:10%;
    left:10%;
}

.c2{
    width:250px;
    height:250px;
    background:#0044ff;
    bottom:10%;
    right:10%;
}

.c3{
    width:200px;
    height:200px;
    background:#00ffff;
    top:50%;
    left:50%;
}

@keyframes move{
    from{
        transform:translate(0,0) scale(1);
    }
    to{
        transform:translate(50px,-50px) scale(1.2);
    }
}
</style>
</head>

<body>

<div class="color c1"></div>
<div class="color c2"></div>
<div class="color c3"></div>

</body>
</html>
