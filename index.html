<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLYGLOT IDE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;--s1:#0d0f18;--s2:#13162a;--s3:#1a1e35;
  --b1:#252942;--b2:#353a60;
  --acc:#00e5ff;--acc2:#ff4d8d;--acc3:#aaff00;--acc4:#ffaa00;--acc5:#c084fc;
  --txt:#d0d8ff;--muted:#525878;--dim:#2a2f55;
  --glow:rgba(0,229,255,0.25);
  --font-ui:'IBM Plex Mono',monospace;
  --font-logo:'Space Grotesk',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-ui);background:var(--bg);color:var(--txt);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:9999;}
.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;position:relative;z-index:10;}
.logo{font-family:var(--font-logo);font-weight:800;font-size:15px;letter-spacing:2px;color:var(--acc);text-shadow:0 0 20px var(--acc);white-space:nowrap;}
.logo span{color:var(--acc2);text-shadow:0 0 20px var(--acc2);}
.sep{width:1px;height:24px;background:var(--b1);}
.topbar-actions{display:flex;gap:6px;margin-left:auto;align-items:center;}
.btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:4px;border:1px solid var(--b2);background:var(--s2);color:var(--txt);font-family:var(--font-ui);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover:not(:disabled){border-color:var(--acc);color:var(--acc);box-shadow:0 0 12px var(--glow);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn.run{background:var(--acc2);border-color:var(--acc2);color:#fff;font-weight:700;}
.btn.run:hover:not(:disabled){background:#ff1a70;box-shadow:0 0 20px rgba(255,77,141,.5);}
.btn.build{border-color:var(--acc3);color:var(--acc3);}
.btn.build:hover:not(:disabled){background:var(--acc3);color:#000;}
.btn.runall{border-color:var(--acc5);color:var(--acc5);font-weight:700;}
.btn.runall:hover:not(:disabled){background:var(--acc5);color:#000;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;display:flex;flex-direction:column;background:var(--s1);border-right:1px solid var(--b1);flex-shrink:0;}
.sidebar-hdr{padding:10px 14px;font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.sidebar-hdr button{background:none;border:none;color:var(--acc);cursor:pointer;font-size:18px;line-height:1;transition:transform .2s;}
.sidebar-hdr button:hover{transform:rotate(90deg);}
.filelist{flex:1;overflow-y:auto;padding:6px;}
.file-item{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:5px;cursor:pointer;font-size:11px;transition:all .12s;border:1px solid transparent;}
.file-item:hover{background:var(--s2);}
.file-item.active{background:rgba(0,229,255,.07);border-color:rgba(0,229,255,.2);}
.file-item.active .fname{color:var(--acc);}
.ficon{font-size:13px;flex-shrink:0;}
.fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fbadge{font-size:8px;padding:1px 5px;border-radius:3px;background:var(--s3);color:var(--muted);flex-shrink:0;}
.fdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.file-item:hover .fdel{opacity:1;}
.fdel:hover{color:var(--acc2)!important;}
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.cs-info{padding:5px 14px;background:rgba(192,132,252,.06);border-bottom:1px solid rgba(192,132,252,.2);font-size:9px;color:var(--acc5);display:none;align-items:center;gap:8px;}
.cs-info.show{display:flex;}
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b1);overflow-x:auto;flex-shrink:0;}
.tabs::-webkit-scrollbar{height:2px;}
.tab{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:11px;cursor:pointer;border-right:1px solid var(--b1);white-space:nowrap;color:var(--muted);transition:all .12s;flex-shrink:0;}
.tab:hover{color:var(--txt);background:var(--s2);}
.tab.active{color:var(--txt);background:var(--bg);border-top:2px solid var(--acc);}
.tab-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;line-height:1;}
.tab-x:hover{color:var(--acc2);}
.editor-wrap{flex:1;display:flex;overflow:hidden;position:relative;}
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);}
.empty-glyph{font-size:72px;opacity:.15;}
.empty-title{font-family:var(--font-logo);font-size:22px;font-weight:700;color:var(--dim);}
.linenos{width:48px;background:var(--s1);border-right:1px solid var(--b1);padding:16px 8px;text-align:right;font-size:12px;line-height:1.65;color:var(--muted);overflow:hidden;flex-shrink:0;user-select:none;}
.editor{flex:1;background:transparent;color:var(--txt);font-family:var(--font-ui);font-size:13px;line-height:1.65;padding:16px;border:none;outline:none;resize:none;overflow-y:auto;tab-size:2;white-space:pre;caret-color:var(--acc);}
.runall-bar{height:2px;background:var(--b1);flex-shrink:0;}
.runall-fill{height:100%;background:linear-gradient(90deg,var(--acc5),var(--acc));width:0%;transition:width .4s ease;}
.statusbar{display:flex;align-items:center;gap:18px;padding:3px 14px;background:var(--s1);border-top:1px solid var(--b1);font-size:10px;flex-shrink:0;}
.s-item{display:flex;align-items:center;gap:5px;color:var(--muted);}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--acc3);}
.s-dot.busy{background:var(--acc4);animation:blink 1s infinite;}
.s-dot.cs{background:var(--acc5);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.output{height:210px;background:var(--s1);border-top:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;}
.out-tabs{display:flex;border-bottom:1px solid var(--b1);align-items:center;flex-shrink:0;}
.out-tab{padding:5px 14px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-right:1px solid var(--b1);transition:color .15s;}
.out-tab:hover{color:var(--txt);}
.out-tab.active{color:var(--acc);}
.out-body{flex:1;overflow-y:auto;padding:8px 14px;font-size:11px;line-height:1.7;}
.out-line{padding:1px 0;white-space:pre-wrap;word-break:break-all;}
.out-line.err{color:#ff5555;}
.out-line.ok{color:var(--acc3);}
.out-line.inf{color:var(--acc);}
.out-line.warn{color:var(--acc4);}
.out-line.out{color:#b8c0e0;}
.out-line.sys{color:#9966ff;}
.out-line.cs{color:var(--acc5);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px);}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:10px;padding:28px;width:400px;box-shadow:0 30px 60px rgba(0,0,0,.6);transform:scale(.95);transition:transform .2s;}
.modal-bg.open .modal{transform:scale(1);}
.modal h3{font-family:var(--font-logo);font-size:16px;margin-bottom:18px;color:var(--acc);}
.fg{margin-bottom:13px;}
.fl{display:block;font-size:9px;color:var(--muted);margin-bottom:5px;letter-spacing:1.5px;text-transform:uppercase;}
.fi,.fs{width:100%;padding:8px 11px;background:var(--bg);border:1px solid var(--b1);color:var(--txt);border-radius:5px;font-family:var(--font-ui);font-size:12px;transition:border-color .2s;}
.fi:focus,.fs:focus{outline:none;border-color:var(--acc);}
.fs option{background:var(--s1);}
.modal-act{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.spin{display:inline-block;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">POLY<span>GLOT</span>·IDE</div>
  <div class="sep"></div>
  <div style="font-size:10px;color:var(--muted);">C#: Piston(.NET) → Wandbox(Mono) → Roslyn → Built-in</div>
  <div class="topbar-actions">
    <button class="btn" onclick="openModal()">＋ New</button>
    <button class="btn build" onclick="buildAll()">⚡ Build</button>
    <button class="btn run" id="runBtn" onclick="runCurrent()">▶ Run</button>
    <button class="btn runall" id="runAllBtn" onclick="runAll()">◈ Run All</button>
  </div>
</div>

<div class="runall-bar"><div class="runall-fill" id="raFill"></div></div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-hdr">Files<button onclick="openModal()">＋</button></div>
    <div class="filelist" id="fileList"></div>
  </div>
  <div class="editor-area">
    <div class="cs-info" id="csInfo">
      🔷 C# ENGINE: Piston .NET Runtime → Wandbox Mono → JDoodle → Built-in JS interpreter
    </div>
    <div class="tabs" id="tabBar"></div>
    <div class="editor-wrap">
      <div class="empty" id="emptyState">
        <div class="empty-glyph">⌨</div>
        <div class="empty-title">No file open</div>
        <button class="btn" onclick="openModal()" style="margin-top:4px;">＋ Create File</button>
      </div>
      <div id="lineNums" class="linenos" style="display:none"></div>
      <textarea id="ed" class="editor" style="display:none" spellcheck="false"
        oninput="onInput()" onscroll="syncScroll()" onkeydown="onKey(event)"
        onclick="updatePos()" onkeyup="updatePos()"></textarea>
    </div>
    <div class="output">
      <div class="out-tabs">
        <div class="out-tab active" id="ot0" onclick="switchTab(0)">TERMINAL</div>
        <div class="out-tab" id="ot1" onclick="switchTab(1)">BUILD</div>
        <div class="out-tab" id="ot2" onclick="showCSInfo()">C# ENGINES</div>
        <div style="margin-left:auto;padding:4px 8px;display:flex;gap:6px;align-items:center;">
          <span id="engLabel" style="font-size:9px;color:var(--muted);"></span>
          <button class="btn" style="padding:2px 8px;font-size:9px;" onclick="clearOut()">CLR</button>
        </div>
      </div>
      <div class="out-body" id="outBody"></div>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="s-item"><div class="s-dot" id="sDot"></div><span id="sLang">Ready</span></div>
  <div class="s-item" id="sPos">Ln 1, Col 1</div>
  <div class="s-item" id="sFiles">0 files</div>
  <div style="margin-left:auto;" class="s-item">Ctrl+Enter=Run · Ctrl+S=Save</div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>✦ New File</h3>
    <div class="fg"><label class="fl">File Name</label>
      <input class="fi" id="mName" placeholder="main.cs" onkeydown="if(event.key==='Enter')doCreate()">
    </div>
    <div class="fg"><label class="fl">Language</label>
      <select class="fs" id="mLang" onchange="autoExt()">
        <option value="javascript">JavaScript — eval()</option>
        <option value="typescript">TypeScript — transpile+eval</option>
        <option value="python">Python — Skulpt WASM</option>
        <option value="ruby">Ruby — Opal.js</option>
        <option value="lua">Lua — Fengari WASM</option>
        <option value="csharp">C# — 4-layer engine</option>
        <option value="html">HTML — preview</option>
        <option value="css">CSS — preview</option>
        <option value="sql">SQL — sql.js SQLite</option>
        <option value="brainfuck">Brainfuck — interpreter</option>
        <option value="cpp">C++ — Wandbox API</option>
        <option value="java">Java — Wandbox API</option>
        <option value="rust">Rust — Playground API</option>
        <option value="go">Go — Wandbox API</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Template</label>
      <select class="fs" id="mTpl">
        <option value="blank">Blank</option>
        <option value="hello">Hello World</option>
        <option value="algo">Algorithm</option>
        <option value="fib">Fibonacci</option>
      </select>
    </div>
    <div class="modal-act">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn run" onclick="doCreate()">Create</button>
    </div>
  </div>
</div>

<script>
"use strict";

// ═══════════════════════════════════
// LANG CONFIG
// ═══════════════════════════════════
var LANGS = {
  javascript: {ext:'js',   icon:'🟨', label:'JS',   color:'#f7df1e', engine:'eval()'},
  typescript: {ext:'ts',   icon:'🔷', label:'TS',   color:'#3178c6', engine:'ts→eval'},
  python:     {ext:'py',   icon:'🐍', label:'PY',   color:'#4b9cd3', engine:'Skulpt'},
  ruby:       {ext:'rb',   icon:'💎', label:'RB',   color:'#cc342d', engine:'Opal.js'},
  lua:        {ext:'lua',  icon:'🌙', label:'LUA',  color:'#6666aa', engine:'Fengari'},
  csharp:     {ext:'cs',   icon:'🟣', label:'C#',   color:'#c084fc', engine:'Piston/.NET'},
  html:       {ext:'html', icon:'🌐', label:'HTML', color:'#e44d26', engine:'srcdoc'},
  css:        {ext:'css',  icon:'🎨', label:'CSS',  color:'#264de4', engine:'preview'},
  sql:        {ext:'sql',  icon:'🗄', label:'SQL',  color:'#f0a500', engine:'sql.js'},
  brainfuck:  {ext:'bf',   icon:'🧠', label:'BF',   color:'#7e4cc9', engine:'interp'},
  cpp:        {ext:'cpp',  icon:'⚙',  label:'C++',  color:'#9c033a', engine:'Wandbox'},
  java:       {ext:'java', icon:'☕', label:'JV',   color:'#f89820', engine:'Wandbox'},
  rust:       {ext:'rs',   icon:'🦀', label:'RS',   color:'#ce422b', engine:'Playground'},
  go:         {ext:'go',   icon:'🐹', label:'GO',   color:'#00acd7', engine:'Wandbox'},
};

// ═══════════════════════════════════
// TEMPLATES
// ═══════════════════════════════════
var TPL = {
  javascript: {
    blank: '// JavaScript\n',
    hello: 'console.log("Hello, World!");\nconsole.log("JS via eval()");\n',
    algo:  'function mergeSort(arr){\n  if(arr.length<=1)return arr;\n  var mid=Math.floor(arr.length/2);\n  return merge(mergeSort(arr.slice(0,mid)),mergeSort(arr.slice(mid)));\n}\nfunction merge(a,b){\n  var r=[],i=0,j=0;\n  while(i<a.length&&j<b.length)r.push(a[i]<=b[j]?a[i++]:b[j++]);\n  return r.concat(a.slice(i)).concat(b.slice(j));\n}\nvar arr=[38,27,43,3,9,82,10];\nconsole.log("Input:",arr.join(", "));\nconsole.log("Sorted:",mergeSort(arr).join(", "));\n',
    fib:   'var a=0,b=1,r=[];\nfor(var i=0;i<15;i++){r.push(a);var t=a+b;a=b;b=t;}\nconsole.log("Fibonacci:",r.join(", "));\nconsole.log("Sum:",r.reduce(function(x,y){return x+y;},0));\n',
  },
  typescript: {
    blank: '// TypeScript\n',
    hello: 'const msg: string = "Hello, TypeScript!";\nconsole.log(msg);\n',
    algo:  'function quickSort(arr: number[]): number[] {\n  if(arr.length<=1) return arr;\n  const p=arr[Math.floor(arr.length/2)];\n  return [...quickSort(arr.filter(x=>x<p)),...arr.filter(x=>x===p),...quickSort(arr.filter(x=>x>p))];\n}\nconst d: number[]=[64,34,25,12,22,11,90];\nconsole.log("Sorted:",quickSort(d).join(", "));\n',
    fib:   'function fib(n: number): number[] {\n  const s: number[]=[];\n  let a=0,b=1;\n  for(let i=0;i<n;i++){s.push(a);[a,b]=[b,a+b];}\n  return s;\n}\nconsole.log("Fibonacci:",fib(15).join(", "));\n',

    blank: '# Python (Skulpt)\n',
    hello: 'print("Hello, World!")\nprint(2+2)\n',
    algo:  'def qsort(a):\n    if len(a)<=1: return a\n    p=a[len(a)//2]\n    return qsort([x for x in a if x<p])+[x for x in a if x==p]+qsort([x for x in a if x>p])\nprint(qsort([38,27,43,3,9,82,10]))\n',

    fib:   'a,b,r=0,1,[]\n15.times{r<<a;a,b=b,a+b}\nputs r.inspect\n',
  },
  lua: {
    blank: '-- Lua (Fengari)\n',
    hello: 'print("Hello, World!")\nprint(string.format("2^10 = %d", 2^10))\n',
    algo:  'local d={38,27,43,3,9,82,10}\ntable.sort(d)\nprint("Sorted: "..table.concat(d,", "))\n',
    fib:   'local a,b,r=0,1,{}\nfor i=1,15 do r[i]=a;local t=a+b;a=b;b=t end\nprint("Fibonacci: "..table.concat(r,", "))\n',

  },
  html: {
    blank: '<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"><title>Page</title></head>\n<body>\n\n</body>\n</html>\n',

  },
  css: {
    blank: '/* CSS */\n',
    hello: 'body{font-family:sans-serif;background:#07080d;color:#d0d8ff;display:grid;place-items:center;min-height:100vh;}\nh1{background:linear-gradient(90deg,#00e5ff,#ff4d8d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2.5rem;}\n',
    algo:  '.card{background:#13162a;border:1px solid #252942;border-radius:12px;padding:24px;transition:transform .2s;}\n.card:hover{transform:translateY(-4px);}\n',
    fib:   '/* no fib template for CSS */\n',
  },
  sql: {

function execJS(code) {
  var out = [];
  var con = {
    log:   function() { out.push({t:'out', v:Array.from(arguments).map(fmtV).join(' ')}); },
    error: function() { out.push({t:'err', v:'Error: '+Array.from(arguments).join(' ')}); },
    warn:  function() { out.push({t:'warn',v:'Warn: '+Array.from(arguments).join(' ')}); },
    info:  function() { out.push({t:'inf', v:Array.from(arguments).join(' ')}); },
  };
  try { new Function('console', code)(con); }
  catch(e) { out.push({t:'err', v:'RuntimeError: '+e.message}); }
  return out;
}
function fmtV(v) {
  if(v===null) return 'null';
  if(v===undefined) return 'undefined';
  if(typeof v==='string') return v;
  if(Array.isArray(v)) return '['+v.map(fmtV).join(', ')+']';
  try { return JSON.stringify(v); } catch(e) { return String(v); }
}

function execTS(code) {
  var js = code
    .replace(/^interface\s+\w+[^{]*\{[^}]*\}/gm, '')
    .replace(/^type\s+\w+\s*=[^\n]+/gm, '')
    .replace(/\b(private|public|protected|readonly|abstract|override)\s+/g, '')
    .replace(/:\s*(string|number|boolean|void|any|never|unknown|null|undefined|object)\s*(?=\s*[=,);>\n{])/g, '')
    .replace(/\)\s*:\s*\w[\w<>\[\]|& ]*\s*\{/g, ') {')
    .replace(/\bas\s+\w[\w<>\[\]]*\b/g, '')
    .replace(/(\w)!/g, '$1')
    .replace(/function\s+(\w+)\s*<[^(]*>/g, 'function $1');
  return execJS(js);
}

            }
          } catch(e) { out.push({t:'err', v:'SQL: '+e.message}); }
        });
        db.close();
        resolve(out.length ? out : [{t:'inf',v:'(no output)'}]);
      } catch(e) { resolve([{t:'err',v:'sql.js: '+e.message}]); }
    }

// ═══════════════════════════════════
// ENGINE: Brainfuck
// ═══════════════════════════════════
function execBrainfuck(code) {
  var clean = code.replace(/[^><+\-.,[\]]/g,'');
  var mem = new Uint8Array(30000);
  var mp=0, ip=0, ops=0, output='';
  var jumps={}, stack=[];
  for(var i=0;i<clean.length;i++){
    if(clean[i]==='[') stack.push(i);
    else if(clean[i]===']'){
      var j=stack.pop();
      if(j===undefined) return [{t:'err',v:'Unmatched ]'}];
      jumps[j]=i; jumps[i]=j;
    }
  }
  if(stack.length) return [{t:'err',v:'Unmatched ['}];
  while(ip<clean.length && ops<5000000){
    ops++;
    switch(clean[ip]){
      case '>': mp=(mp+1)%30000; break;
      case '<': mp=(mp-1+30000)%30000; break;
      case '+': mem[mp]=(mem[mp]+1)&0xFF; break;
      case '-': mem[mp]=(mem[mp]-1+256)&0xFF; break;
      case '.': output+=String.fromCharCode(mem[mp]); break;
      case ',': mem[mp]=0; break;
      case '[': if(!mem[mp]) ip=jumps[ip]; break;
      case ']': if(mem[mp])  ip=jumps[ip]; break;
    }
    ip++;
  }
  var out=[];
  if(ops>=5000000) out.push({t:'warn',v:'5M ops limit reached'});
  if(output) output.split('\n').forEach(function(l){out.push({t:'out',v:l});});
  else out.push({t:'inf',v:'(no output)'});
  return Promise.resolve(out);
}

function builtinCS(code) {

    var mm;
    while((mm = mRe.exec(src)) !== null){
      if(mm[1]==='Main') continue;
      var bs = mm.index + mm[0].length;
      helpers.push({name:mm[1], params:mm[2], body:extractBody(src,bs)});
    }

    // Extract Main body
    var mainMatch = /static\s+(?:void|async\s+Task)\s+Main\s*\([^)]*\)\s*\{/.exec(src);
    if(!mainMatch){ out.push({t:'err',v:'C#: Main() not found'}); return out; }
    var mb = src.indexOf('{', mainMatch.index) + 1;
    var mainBody = extractBody(src, mb);

    function xp(cs) {
      var js = cs;
      // String interpolation
      js = js.replace(/\$"((?:[^"\\]|\\.)*)"/g, function(_,s){ return '`'+s.replace(/\{([^}]+)\}/g,'${$1}')+'`'; });

      js = js.replace(/Console\.WriteLine\s*\(\s*\)\s*;/g,'__pl("");');
      js = js.replace(/Console\.WriteLine\s*\(([^;]+?)\)\s*;/g,'__pl($1);');
      js = js.replace(/Console\.Write\s*\(([^;]+?)\)\s*;/g,'__pw($1);');
      // Random
      js = js.replace(/new\s+Random\s*\(\s*\)/g,'__rnd()');
      js = js.replace(/new\s+Random\s*\(([^)]+)\)/g,'__rnd($1)');
      js = js.replace(/(\w+)\.Next\s*\(([^,)]+),([^)]+)\)/g,'__nx($1,$2,$3)');
      js = js.replace(/(\w+)\.Next\s*\(([^)]+)\)/g,'__nx($1,0,$2)');
      js = js.replace(/(\w+)\.NextDouble\s*\(\s*\)/g,'Math.random()');
      // Types
      js = js.replace(/\b(int|long|double|float|string|bool|char|var|decimal|uint|byte|short)\[\]\s+(\w+)\s*=/g,'let $2 =');
      js = js.replace(/\b(int|long|double|float|string|bool|char|var|decimal|uint|byte|short)\s+(\w+)\s*=/g,'let $2 =');
      js = js.replace(/for\s*\(\s*(int|long|var|uint|byte|short)\s+/g,'for(let ');
      js = js.replace(/new\s+(?:int|long|double|float|string|bool|char)\s*\[\s*\]\s*\{([^}]*)\}/g,'[$1]');
      js = js.replace(/new\s+(?:int|long|double|float|string|bool|char)\s*\[([^\]]+)\]/g,'new Array(Math.floor($1)).fill(0)');
      // Math
      js = js.replace(/Math\.Sqrt\s*\(/g,'Math.sqrt(').replace(/Math\.Abs\s*\(/g,'Math.abs(');
      js = js.replace(/Math\.Pow\s*\(/g,'Math.pow(').replace(/Math\.Floor\s*\(/g,'Math.floor(');
      js = js.replace(/Math\.Ceiling\s*\(/g,'Math.ceil(').replace(/Math\.Round\s*\(/g,'Math.round(');
      js = js.replace(/Math\.Max\s*\(/g,'Math.max(').replace(/Math\.Min\s*\(/g,'Math.min(');
      // String methods
      js = js.replace(/\.Length\b/g,'.length').replace(/\.Count\b/g,'.length');
      js = js.replace(/\.ToString\s*\(\s*\)/g,'.toString()');
      js = js.replace(/\.ToUpper\s*\(\s*\)/g,'.toUpperCase()');
      js = js.replace(/\.ToLower\s*\(\s*\)/g,'.toLowerCase()');
      js = js.replace(/\.Trim\s*\(\s*\)/g,'.trim()');
      js = js.replace(/\.Contains\s*\(/g,'.includes(');
      js = js.replace(/\.StartsWith\s*\(/g,'.startsWith(');
      js = js.replace(/\.EndsWith\s*\(/g,'.endsWith(');
      js = js.replace(/\.IndexOf\s*\(/g,'.indexOf(');
      js = js.replace(/\.Replace\s*\(/g,'.replaceAll(');
      js = js.replace(/\.Substring\s*\(/g,'.substring(');
      js = js.replace(/int\.Parse\s*\(/g,'parseInt(');
      js = js.replace(/double\.Parse\s*\(/g,'parseFloat(');
      js = js.replace(/Convert\.ToInt32\s*\(/g,'Math.round(');
      js = js.replace(/string\.Join\s*\("([^"]*)"\s*,\s*([^)]+)\)/g,'Array.from($2).join("$1")');
      js = js.replace(/String\.Empty\b/g,'""');
      js = js.replace(/Environment\.NewLine\b/g,'"\\n"');
      js = js.replace(/Console\.Clear\s*\(\s*\)\s*;/g,'');
      // Cast
      js = js.replace(/\(\s*(?:int|long|double|float|string|bool|char|decimal)\s*\)\s*/g,'');
      // Access mods
      js = js.replace(/\b(?:private|public|protected|readonly|abstract|override)\s+/g,'');
      // Typed params
      js = js.replace(/\b(?:int|long|double|float|string|bool|char|var|decimal)\s+(\w+)(?=\s*[,)])/g,'$1');
      return js;
    }

    var fullJS = '';
    helpers.forEach(function(m){
      var p = m.params.replace(/\b(?:int|long|double|float|string|bool|char|var|decimal)\s+(\w+)/g,'$1');
      fullJS += 'function '+m.name+'('+p+'){\n'+xp(m.body)+'\n}\n';
    });
    fullJS += xp(mainBody);

    var lines = [], wbuf = [];
    function mkRnd(seed){
      var s = ((seed !== undefined ? seed : Math.random()*2147483647)|0)||12345;
      return { _s:s, ni:function(a,b){ this._s=Math.imul(this._s,1664525)+1013904223|0; return Math.abs(this._s)%(b-a)+a; }};
    }
    var fn = new Function('__pl','__pw','__rnd','__nx','Math','parseInt','parseFloat','"use strict";\n'+fullJS);
    fn(
      function(v){ var p=wbuf.splice(0).join(''); (p+csStr(v)).split('\n').forEach(function(l){lines.push({t:'out',v:l});}); },
      function(v){ wbuf.push(csStr(v)); },
      function(s){ return mkRnd(s); },
      function(r,a,b){ return (r&&r.ni?r:mkRnd()).ni(a|0,b|0); },
      Math, parseInt, parseFloat
    );
    if(wbuf.length) wbuf.join('').split('\n').forEach(function(l){lines.push({t:'out',v:l});});
    lines.forEach(function(l){out.push(l);});
    if(!lines.length) out.push({t:'inf',v:'(no output)'});
    out.push({t:'cs',v:'Layer 4: Built-in interpreter OK'});
  } catch(e) {
    out.push({t:'err',v:'C# Error: '+e.message});
  }
  return out;
}

function extractBody(src, start){
  var depth=1, i=start;
  while(i<src.length && depth>0){
    if(src[i]==='"'){ i++; while(i<src.length && src[i]!=='"'){if(src[i]==='\\')i++;i++;} }
    else if(src[i]==="'"){ i++; while(i<src.length && src[i]!=="'"){if(src[i]==='\\')i++;i++;} }
    else if(src[i]==='{') depth++;
    else if(src[i]==='}'){depth--;if(!depth)break;}
    i++;
  }
  return src.slice(start,i);
}
function csStr(v){ if(v==null)return''; if(typeof v==='boolean')return v?'True':'False'; return String(v); }

// Main C# executor — tries layers in order
function execCSharp(code) {
  var hdr = [{t:'cs',v:'C# engine: trying Piston (.NET) → Wandbox (Mono) → JDoodle → Built-in'}];
  return tryPiston(code).then(function(r){
    if(r) return hdr.concat(r);
    hdr.push({t:'warn',v:'Piston unavailable, trying Wandbox Mono...'});
    return tryWandboxCS(code).then(function(r2){
      if(r2) return hdr.concat(r2);
      hdr.push({t:'warn',v:'Wandbox unavailable, trying JDoodle...'});
      return tryJDoodle(code).then(function(r3){
        if(r3) return hdr.concat(r3);
        hdr.push({t:'warn',v:'Remote APIs unavailable, using built-in interpreter...'});
        return hdr.concat(builtinCS(code));
      });
    });
  });
}

// ═══════════════════════════════════
// DISPATCHER
// ═══════════════════════════════════
function executeFile(name) {
  var f = files[name];
  if(!f) return Promise.resolve([]);
  switch(f.lang){
    case 'javascript': return Promise.resolve(execJS(f.code));
    case 'typescript': return Promise.resolve(execTS(f.code));
    case 'python':     return execPython(f.code);
    case 'ruby':       return execRuby(f.code);
    case 'lua':        return execLua(f.code);
    case 'csharp':     return execCSharp(f.code);
    case 'html':       return execHTML(f.code);
    case 'css':        return execCSS(f.code);
    case 'sql':        return execSQL(f.code);
    case 'brainfuck':  return Promise.resolve(execBrainfuck(f.code));
    case 'cpp':        return execCPP(f.code);
    case 'java':       return execJava(f.code);
    case 'rust':       return execRust(f.code);
    case 'go':         return execGo(f.code);
    default: return Promise.resolve([{t:'warn',v:'No engine for: '+f.lang}]);
  }
}

// ═══════════════════════════════════
// RUN CURRENT
// ═══════════════════════════════════
function runCurrent() {
  if(!active || !files[active]){ log('No file open','warn'); return; }
  save();
  var f = files[active];
  var m = LANGS[f.lang];
  var btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> Running...';
  document.getElementById('sDot').className = 's-dot busy';
  log('▶ '+active+' ['+m.engine+']','inf');
  executeFile(active).then(function(out){
    out.forEach(function(o){ log(o.v, o.t); });
    btn.disabled = false;
    btn.innerHTML = '▶ Run';
    document.getElementById('sDot').className = 's-dot'+(f.lang==='csharp'?' cs':'');
  }).catch(function(e){
    log('Error: '+e.message,'err');
    btn.disabled = false;
    btn.innerHTML = '▶ Run';
    document.getElementById('sDot').className = 's-dot';
  });
}

// ═══════════════════════════════════
// RUN ALL
// ═══════════════════════════════════
function runAll() {
  save();
  var fnames = Object.keys(files);
  if(!fnames.length){ log('No files','warn'); return; }

  var runBtn    = document.getElementById('runBtn');
  var runAllBtn = document.getElementById('runAllBtn');
  var fill      = document.getElementById('raFill');
  runBtn.disabled    = true;
  runAllBtn.disabled = true;
  runAllBtn.innerHTML = '<span class="spin">◈</span> Running All...';
  document.getElementById('sDot').className = 's-dot busy';

  log('','sys');
  log('◈ RUN ALL — '+fnames.length+' file(s)', 'sys');
  log('─────────────────────────────────────────', 'sys');

  var idx = 0;
  var results = [];

  function next() {
    if(idx >= fnames.length) {
      fill.style.width = '100%';
      setTimeout(function(){ fill.style.width='0%'; }, 1500);
      log('', 'sys');
      log('─────────────────────────────────────────', 'sys');
      var ok = results.filter(function(r){return r.ok;}).length;
      log('◈ DONE — '+ok+'/'+fnames.length+' passed', ok===fnames.length?'ok':'warn');
      results.forEach(function(r){
        log('  '+(r.ok?'✓':'✗')+' '+r.name, r.ok?'ok':'err');
      });
      runBtn.disabled    = false;
      runAllBtn.disabled = false;
      runAllBtn.innerHTML = '◈ Run All';
      document.getElementById('sDot').className = 's-dot';
      return;
    }
    fill.style.width = (idx/fnames.length*100)+'%';
    var name = fnames[idx];
    var f = files[name];
    var m = LANGS[f.lang];
    log('', 'sys');
    log('['+(idx+1)+'/'+fnames.length+'] ▶ '+name+' ['+m.engine+']', 'sys');
    executeFile(name).then(function(out){
      var hasErr = false;
      out.forEach(function(o){ log('  '+o.v, o.t); if(o.t==='err') hasErr=true; });
      results.push({name:name, ok:!hasErr});
      log('  '+(hasErr?'✗ FAILED':'✓ OK')+': '+name, hasErr?'err':'ok');
      idx++;
      next();
    }).catch(function(e){
      log('  ✗ ERROR: '+e.message,'err');
      results.push({name:name, ok:false});
      idx++;
      next();
    });
  }
  next();
}

// ═══════════════════════════════════
// BUILD ALL
// ═══════════════════════════════════
function buildAll() {
  var fns = Object.keys(files);
  if(!fns.length){ log('No files','warn'); return; }
  switchTab(1);
  log('⚡ Build started...','inf');
  fns.forEach(function(n, i){
    setTimeout(function(){
      var m = LANGS[files[n].lang];
      log('  ✓ '+n+' ['+m.engine+']','ok');
      if(i===fns.length-1) log('Build complete — '+fns.length+' files','ok');
    }, i*80);
  });
}

// ═══════════════════════════════════
// FILE OPERATIONS
// ═══════════════════════════════════
function save() {
  if(active && files[active]) files[active].code = document.getElementById('ed').value;
}
function openModal() {
  document.getElementById('modal').classList.add('open');
  setTimeout(function(){ document.getElementById('mName').focus(); }, 150);
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('mName').value = '';
}
function autoExt() {
  var lang = document.getElementById('mLang').value;
  var m = LANGS[lang];
  var ni = document.getElementById('mName');
  var cur = ni.value;
  if(!cur || cur.startsWith('.')) ni.value = 'untitled.'+m.ext;
  else ni.value = cur.replace(/\.[^.]*$/,'') + '.'+m.ext;
}
function doCreate() {
  var name = document.getElementById('mName').value.trim();
  var lang = document.getElementById('mLang').value;
  var tpl  = document.getElementById('mTpl').value;
  var m    = LANGS[lang];
  if(!name) name = 'untitled.'+m.ext;
  if(name.indexOf('.')<0) name += '.'+m.ext;
  if(files[name]){ log('"'+name+'" already exists','warn'); closeModal(); openFile(name); return; }
  var code = (TPL[lang] && TPL[lang][tpl]) || (TPL[lang] && TPL[lang].blank) || '';
  files[name] = {name:name, lang:lang, code:code};
  log('Created: '+name+' ['+m.engine+']','ok');
  closeModal();
  renderSidebar();
  openFile(name);
}
function deleteFile(name, e) {
  e.stopPropagation();
  delete files[name];
  tabs = tabs.filter(function(t){return t!==name;});
  if(active===name) active = tabs[tabs.length-1] || null;
  log('Deleted: '+name,'err');
  renderSidebar(); renderTabs(); renderEditor();
}
function openFile(name) {
  if(!files[name]) return;
  save();
  if(tabs.indexOf(name)<0) tabs.push(name);
  active = name;
  renderSidebar(); renderTabs(); renderEditor();
}
function closeTab(name, e) {
  e.stopPropagation();
  save();
  tabs = tabs.filter(function(t){return t!==name;});
  if(active===name) active = tabs[tabs.length-1] || null;
  renderSidebar(); renderTabs(); renderEditor();
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function renderSidebar() {
  var fns = Object.keys(files);
  document.getElementById('sFiles').textContent = fns.length+' file'+(fns.length!==1?'s':'');
  var html = '';
  fns.forEach(function(name){
    var f = files[name], m = LANGS[f.lang];
    html += '<div class="file-item'+(name===active?' active':'')+'" onclick="openFile(\''+name+'\')">' +
      '<span class="ficon">'+m.icon+'</span>' +
      '<span class="fname">'+name+'</span>' +
      '<span class="fbadge" style="color:'+m.color+'">'+m.label+'</span>' +
      '<button class="fdel" onclick="deleteFile(\''+name+'\',event)">✕</button>' +
      '</div>';
  });
  document.getElementById('fileList').innerHTML = html;
}
function renderTabs() {
  var html = '';
  tabs.forEach(function(name){
    var f = files[name];
    if(!f) return;
    var m = LANGS[f.lang];
    html += '<div class="tab'+(name===active?' active':'')+'" onclick="openFile(\''+name+'\')">' +
      '<span>'+m.icon+'</span><span>'+name+'</span>' +
      '<button class="tab-x" onclick="closeTab(\''+name+'\',event)">✕</button>' +
      '</div>';
  });
  document.getElementById('tabBar').innerHTML = html;
}
function renderEditor() {
  var empty   = document.getElementById('emptyState');
  var ed      = document.getElementById('ed');
  var ln      = document.getElementById('lineNums');
  var csInfo  = document.getElementById('csInfo');
  var engLabel= document.getElementById('engLabel');

  if(!active || !files[active]){
    empty.style.display='flex'; ed.style.display='none'; ln.style.display='none';
    csInfo.classList.remove('show');
    document.getElementById('sLang').textContent='No file';
    engLabel.textContent='';
    return;
  }
  var f = files[active], m = LANGS[f.lang];
  empty.style.display='none'; ed.style.display='block'; ln.style.display='block';
  ed.value = f.code;
  document.getElementById('sLang').textContent = m.icon+' '+m.label;
  engLabel.textContent = m.engine.toUpperCase();
  if(f.lang==='csharp') csInfo.classList.add('show'); else csInfo.classList.remove('show');
  document.getElementById('sDot').className = 's-dot'+(f.lang==='csharp'?' cs':'');
  updateLineNums();
  updatePos();
}
function updateLineNums() {
  var ed = document.getElementById('ed');
  if(ed.style.display==='none') return;
  var n = ed.value.split('\n').length;
  var html = '';
  for(var i=1;i<=n;i++) html += i+'<br>';
  document.getElementById('lineNums').innerHTML = html;
}
function syncScroll() {
  document.getElementById('lineNums').scrollTop = document.getElementById('ed').scrollTop;
}
function updatePos() {
  var ed = document.getElementById('ed');
  var lines = ed.value.substring(0,ed.selectionStart).split('\n');
  document.getElementById('sPos').textContent = 'Ln '+lines.length+', Col '+(lines[lines.length-1].length+1);
}
function onInput() {
  if(active && files[active]) files[active].code = document.getElementById('ed').value;
  updateLineNums();
  updatePos();
}
function onKey(e) {
  if(e.key==='Tab'){
    e.preventDefault();
    var ed=document.getElementById('ed'), s=ed.selectionStart;
    ed.value=ed.value.substring(0,s)+'  '+ed.value.substring(ed.selectionEnd);
    ed.selectionStart=ed.selectionEnd=s+2;
    onInput();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); runCurrent(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); save(); log('Saved','ok'); }
}
